# 发布方式：推送到 gh-pages 分支（peaceiris）。
#
# 【必须】与下面设置一致，否则会 404：
# Settings → Pages → Build and deployment
#   - Source 选「Deploy from a branch」（不要选「GitHub Actions」）
#   - Branch 选 gh-pages，文件夹选 / (root)
# 若 Source 仍是「GitHub Actions」，GitHub 只会认 deploy-pages 的部署，
# 不会用 gh-pages 分支里的文件，站点会一直 404。
#
# 【必须】允许工作流写仓库：Settings → Actions → General → Workflow permissions
#   勾选「Read and write permissions」，保存。

name: Build and deploy site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Disable Jekyll on Pages
        run: touch site/.nojekyll

      - name: Verify build output
        run: test -f site/index.html || (echo "::error::site/index.html missing" && exit 1)

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
